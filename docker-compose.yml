services:
  postgres:
    image: postgres:16-alpine
    container_name: artemis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: artemis
      POSTGRES_PASSWORD: artemis_dev
      POSTGRES_DB: artemis_dev
    ports:
      - "5432:5432"
    volumes:
      - artemis_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artemis -d artemis_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  artemis_pg_data:
